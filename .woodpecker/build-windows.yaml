when:
  - event: [push, manual]

labels:
  platform: windows/amd64

steps:
  - name: build
    image: powershell
    commands:
      - |
        $ProgressPreference = 'SilentlyContinue'

        if (!(Get-Command rustc -ErrorAction SilentlyContinue)) {
          echo "Installing Rust..."
          Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
          rustup-init.exe -y
        }

      - rustc --version
