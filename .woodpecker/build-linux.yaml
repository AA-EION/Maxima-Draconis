when:
  - event: [push, manual]

steps:
  - name: build
    image: clux/muslrust:nightly-2024-08-24
    environment:
      RUSTFLAGS: "-C target-feature=+crt-static"
    commands:
      - apt-get -y update
      - apt-get -y install pkg-config libssl-dev build-essential protobuf-compiler
      - cargo build --release --target x86_64-unknown-linux-musl
  - name: notification
    image: appleboy/drone-discord
    settings:
      webhook_id:
        from_secret: discord_webhook_id
      webhook_token:
        from_secret: discord_webhook_token
      message: >
        {{#success build.status}}
          Build {{build.number}} (linux/amd64) succeeded.
        {{else}}
          Build {{build.number}} (linux/amd64) failed.
        {{/success}}
