name: Maxima Build

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
    
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Maxima
    runs-on: ${{ matrix.os }}

    continue-on-error: ${{ matrix.experimental }}  
    strategy:
      fail-fast: false
      matrix:
        rust-version: [nightly]
        os: [ubuntu-latest, windows-latest, macos-latest]
        experimental: [false]

    env:
      CARGO_TERM_COLOR: always

    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4

    - name: Cache Rust ${{ matrix.rust-version }}
      if: runner.os != 'macOS'
      uses: actions/cache@v3
      with:
        path: ${{ github.workspace }}\rust\.rustup
        key: rust-${{ matrix.rust-version }}-${{ hashFiles('**/rust-toolchain') }}

    - name: Setup Rust ${{ matrix.rust-version }}
      if: runner.os != 'macOS'
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: ${{ matrix.rust-version }}
        override: true
        components: rustfmt, clippy

    - name: Install Protoc
      # Only needed for the Rust build (maxima-lib/prost-build). macOS only
      # builds the Swift helper.
      if: runner.os != 'macOS'
      uses: arduino/setup-protoc@v3

    - name: Install Dependencies
      id: install-depends
      if: runner.os == 'Linux'
      run: |
        # X11/xkbcommon libs are only needed by maxima-ui (not built here).
        sudo apt-get install -y musl-tools
        rustup target add x86_64-unknown-linux-musl

    - uses: Swatinem/rust-cache@v2
      if: runner.os != 'macOS'
      with:
        shared-key: ${{ runner.os}}-rust-deps
        cache-on-failure: true
        save-if: ${{ github.ref == 'refs/heads/master' }}

    - name: Build Maxima
      if: runner.os == 'Windows'
      run: |
        cargo build --release -p maxima-cli -p maxima-bootstrap -p maxima-service

    - name: Install NSIS
      if: runner.os == 'Windows'
      run: |
        choco install nsis -y

    - name: Build Installer
      if: runner.os == 'Windows'
      run: |
        $env:PATH += ";C:\Program Files (x86)\NSIS"
        makensis /DBIN_DIR="..\target\release" installer\maxima-setup.nsi

    - uses: actions/upload-artifact@v4
      if: runner.os == 'Windows'
      with:
        name: maxima-x86_64-win64
        path: |
          target/release/maxima-service.exe
          target/release/maxima-bootstrap.exe
          target/release/maxima-cli.exe

    - uses: actions/upload-artifact@v4
      if: runner.os == 'Windows'
      with:
        name: maxima-installer-win64
        path: installer/MaximaSetup.exe

    - name: Build Maxima
      if: runner.os == 'Linux'
      # Only build the Draconis-relevant crates. maxima-ui pulls accesskit_unix →
      # zbus 3 → async-io 1.13 → rustix 0.37.28, which doesn't build on modern
      # nightly (uses `rustc_attrs` which is now a reserved namespace).
      # maxima-service is windows-only. We skip both here.
      run: |
        cargo build --release --target x86_64-unknown-linux-musl \
          -p maxima-cli -p maxima-bootstrap
      env:
        RUSTFLAGS: "-C target-feature=+crt-static"

    - name: File Permissions
      if: runner.os == 'Linux'
      run: |
        ls -l target/x86_64-unknown-linux-musl/release
        chmod +x target/x86_64-unknown-linux-musl/release/maxima-bootstrap
        chmod +x target/x86_64-unknown-linux-musl/release/maxima-cli

    - uses: actions/upload-artifact@v4
      if: runner.os == 'Linux'
      with:
        name: maxima-x86_64-linux-musl
        path: |
          target/x86_64-unknown-linux-musl/release/maxima-bootstrap
          target/x86_64-unknown-linux-musl/release/maxima-cli

    # ── macOS: validate MaximaHelper.app build ─────────────────────────────
    # This mirrors what release.yml does so PRs that break the helper get
    # caught before merge, not on the next tag.
    - name: Build MaximaHelper.app
      if: runner.os == 'macOS'
      run: bash MaximaHelper/build.sh --output ./dist --no-register

    - name: Sanity-check helper bundle
      if: runner.os == 'macOS'
      run: |
        set -e
        test -x ./dist/MaximaHelper.app/Contents/MacOS/MaximaHelper
        test -f ./dist/MaximaHelper.app/Contents/Info.plist
        /usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes" \
          ./dist/MaximaHelper.app/Contents/Info.plist | grep -q "qrc"
        echo "✓ MaximaHelper.app looks healthy"

    # actions/upload-artifact strips the leading path component, so uploading
    # `dist/MaximaHelper.app` directly would flatten Contents/ etc. into the
    # artifact root and lose the `.app` bundle structure. Zip first to preserve
    # it — same approach release.yml uses to produce MaximaHelper.zip.
    - name: Zip MaximaHelper.app
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r --symlinks MaximaHelper.zip MaximaHelper.app

    - uses: actions/upload-artifact@v4
      if: runner.os == 'macOS'
      with:
        name: maxima-helper-zip
        path: dist/MaximaHelper.zip
