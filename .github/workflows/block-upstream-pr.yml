name: Block upstream PRs

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  check-target:
    runs-on: ubuntu-latest
    steps:
      - name: Close PR if it targets the upstream repo
        if: github.event.pull_request.base.repo.full_name == 'ArmchairDevelopers/Maxima'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed'
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## ⛔ PR targeting upstream blocked',
                '',
                'This fork (`AA-EION/Maxima-Draconis`) is not currently contributing changes back to',
                '[ArmchairDevelopers/Maxima](https://github.com/ArmchairDevelopers/Maxima).',
                '',
                'Please retarget your PR to `AA-EION/Maxima-Draconis:master` instead.',
                '',
                'If you believe this change is ready to be proposed upstream, open the PR manually',
                'from the GitHub UI after reviewing with the fork maintainer.'
              ].join('\n')
            });
